<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 6 Blocks</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .block{
            height:180px;
            border-radius:15px;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:28px;
            font-weight:bold;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .block:hover{
            transform:translateY(-5px);
        }

        .block1{ background:#0d6efd; }
        .block2{ background:#198754; }
        .block3{ background:#dc3545; }
        .block4{ background:#ffc107; color:black; }
        .block5{ background:#6f42c1; }
        .block6{ background:#20c997; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-5">Bootstrap 6 Blocks Design</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="block block1">
                Block 1
            </div>
        </div>

        <div class="col-md-4">
            <div class="block block2">
                Block 2
            </div>
        </div>

        <div class="col-md-4">
            <div class="block block3">
                Block 3
            </div>
        </div>

        <div class="col-md-4">
            <div class="block block4">
                Block 4
            </div>
        </div>

        <div class="col-md-4">
            <div class="block block5">
                Block 5
            </div>
        </div>

        <div class="col-md-4">
            <div class="block block6">
                Block 6
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
